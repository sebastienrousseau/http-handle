name: Docs API Surface Score

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-api-surface-score:
    name: API Surface Docs Score (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup nightly Rust + cache
        uses: ./.github/actions/rust-toolchain-cache
        with:
          toolchain: nightly

      - name: Run API surface docs gate
        run: ./scripts/score_docs_api_surface.sh
