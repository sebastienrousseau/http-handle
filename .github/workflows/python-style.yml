name: 🐍 Python Style (Google Strict)

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.pyi"
      - "pyproject.toml"
      - "scripts/enforce_python_style.sh"
      - ".github/workflows/python-style.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.pyi"
      - "pyproject.toml"
      - "scripts/enforce_python_style.sh"
      - ".github/workflows/python-style.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.11"
      - name: Ensure python style script is executable
        run: chmod +x ./scripts/enforce_python_style.sh
      - name: Enforce Google Python style
        run: ./scripts/enforce_python_style.sh
