name: ✅ Execution Plan P0 Gates

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/verify_execution_plan_p0.sh"
      - "scripts/enforce_security_sla.sh"
      - "scripts/perf/**"
      - "security/**"
      - "docs/EXECUTION_PLAN_v0.0.4.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/verify_execution_plan_p0.sh"
      - "scripts/enforce_security_sla.sh"
      - "scripts/perf/**"
      - "security/**"
      - "docs/EXECUTION_PLAN_v0.0.4.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-p0:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify execution plan P0 gates
        run: |
          chmod +x ./scripts/verify_execution_plan_p0.sh
          ./scripts/verify_execution_plan_p0.sh
