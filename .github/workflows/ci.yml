# Unified CI Pipeline
# Uses reusable workflows from sebastienrousseau/pipelines

name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "benches/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/*.yml"
      - "rustfmt.toml"
      - "clippy.toml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "benches/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/*.yml"
      - "rustfmt.toml"
      - "clippy.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-ci:
    name: Rust CI
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@47ed7767be5273aef0bbc60c6f6c16aba5fb6f59 # v0.0.2
    with:
      rust-version: stable
      run-clippy: true
      run-fmt: true
      run-audit: true
      # Coverage is enforced by .github/workflows/coverage-strict.yml.
      # Disable duplicate pipeline coverage job to avoid Codecov-token failures on protected branches.
      run-coverage: false
    secrets: inherit
