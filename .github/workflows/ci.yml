# Unified CI Pipeline
# Uses reusable workflows from sebastienrousseau/pipelines

name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "benches/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/*.yml"
      - "rustfmt.toml"
      - "clippy.toml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "benches/**"
      - "examples/**"
      - "tests/**"
      - ".github/workflows/*.yml"
      - "rustfmt.toml"
      - "clippy.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-ci:
    name: Rust CI
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@cf0413f34ee0f24fe52a32f39d26eca513f65713 # v0.0.1
    with:
      rust-version: stable
      run-clippy: true
      run-fmt: true
      run-audit: true
      run-coverage: true
    secrets: inherit
