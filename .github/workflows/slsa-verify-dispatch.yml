name: SLSA Verify Dispatch

on:
  workflow_dispatch:
    inputs:
      artifact_path:
        description: "Path to artifact to verify"
        required: true
        type: string
      provenance_path:
        description: "Path to provenance file (in-toto)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1
      - name: Verify artifact provenance
        shell: bash
        run: |
          set -euo pipefail
          slsa-verifier verify-artifact \
            "${{ github.event.inputs.artifact_path }}" \
            --provenance-path "${{ github.event.inputs.provenance_path }}" \
            --source-uri "github.com/${{ github.repository }}"
