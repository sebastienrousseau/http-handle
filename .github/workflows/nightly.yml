name: 🌙 Nightly Maintenance

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly-ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@cf0413f34ee0f24fe52a32f39d26eca513f65713 # v0.0.1
    with:
      rust-version: nightly
      run-clippy: true
      run-fmt: true
      run-audit: true
      run-coverage: false
