name: 🧩 Feature Matrix

on:
  push:
    branches: [main, "feat/*"]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/feature-matrix.yml"
  pull_request:
    branches: [main, "feat/*"]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/feature-matrix.yml"
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "async"
          - "batch"
          - "streaming"
          - "optimized"
          - "http2"
          - "async,http2"
          - "async,batch,streaming,optimized,http2"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test feature set
        run: |
          set -euo pipefail
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --no-default-features --workspace
          else
            cargo test --no-default-features --features "${{ matrix.features }}" --workspace
          fi
