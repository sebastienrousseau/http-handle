name: 🧩 Feature Matrix

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/feature-matrix.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/feature-matrix.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "async"
          - "batch"
          - "streaming"
          - "optimized"
          - "high-perf"
          - "enterprise"
          - "http3-profile"
          - "distributed-rate-limit"
          - "multi-tenant"
          - "autotune"
          - "http2"
          - "async,http2"
          - "async,batch,streaming,optimized,http2,high-perf,enterprise"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Test feature set
        run: |
          set -euo pipefail
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --no-default-features --workspace
          else
            cargo test --no-default-features --features "${{ matrix.features }}" --workspace
          fi
