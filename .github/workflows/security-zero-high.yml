name: 🔐 Security Zero High

on:
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "security/**"
      - "scripts/enforce_security_sla.sh"
      - ".github/workflows/security-zero-high.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: taiki-e/install-action@3129e4e510409181151d4a2b5a23cddc723a7015 # cargo-audit
        with:
          tool: cargo-audit
      - name: Enforce cargo-audit policy
        run: cargo audit --deny warnings

  container-high-critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build image
        run: docker build -f docker/http-handle.Dockerfile -t http-handle-security:scan .
      - name: Trivy must report zero HIGH/CRITICAL
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:0.69.1 \
            image \
            --format json \
            --output /work/trivy-high.json \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            http-handle-security:scan
      - name: Enforce zero high/critical
        run: |
          set -euo pipefail
          critical=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-high.json)
          high=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-high.json)
          echo "critical=$critical high=$high"
          test "$critical" -eq 0
          test "$high" -eq 0

  findings-sla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Enforce security findings SLA registry
        env:
          SECURITY_SLA_REPORT_MD: target/security-sla-report.md
        run: |
          chmod +x ./scripts/enforce_security_sla.sh
          ./scripts/enforce_security_sla.sh
      - name: Upload security SLA report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: security-sla-report
          path: target/security-sla-report.md
