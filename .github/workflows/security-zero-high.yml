name: 🔐 Security Zero High

on:
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/**"
      - "security/**"
      - ".github/workflows/security-zero-high.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: taiki-e/install-action@3129e4e510409181151d4a2b5a23cddc723a7015 # cargo-audit
        with:
          tool: cargo-audit
      - name: Enforce cargo-audit policy
        run: cargo audit --deny warnings

  container-high-critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build image
        run: docker build -f docker/http-handle.Dockerfile -t http-handle-security:scan .
      - name: Trivy must report zero HIGH/CRITICAL
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          image-ref: http-handle-security:scan
          format: json
          output: trivy-high.json
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
      - name: Enforce zero high/critical
        run: |
          set -euo pipefail
          critical=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-high.json)
          high=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-high.json)
          echo "critical=$critical high=$high"
          test "$critical" -eq 0
          test "$high" -eq 0
