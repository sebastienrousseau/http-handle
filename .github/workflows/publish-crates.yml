name: 🚀 Publish to crates.io

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup stable toolchain + cache
        uses: ./.github/actions/rust-toolchain-cache
        with:
          toolchain: stable

      - name: Validate crates.io token presence
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Missing required secret: CARGO_REGISTRY_TOKEN"
            exit 1
          fi

      - name: Validate package before publish
        run: |
          set -euo pipefail
          cargo package

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish --token "${CARGO_REGISTRY_TOKEN}"
