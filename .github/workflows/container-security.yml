name: 🛡️ Container Security

on:
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/release-artifacts.yml"
      - ".github/workflows/container-security.yml"
      - "security/cve-baseline.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - docker/http-handle.Dockerfile
          - docker/http-handle-static.Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build image for scan
        run: |
          set -euo pipefail
          tag="http-handle-scan:$(basename "${{ matrix.dockerfile }}")"
          docker build -f "${{ matrix.dockerfile }}" -t "$tag" .
          echo "SCAN_IMAGE=$tag" >> "$GITHUB_ENV"
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          image-ref: ${{ env.SCAN_IMAGE }}
          format: json
          output: trivy-results.json
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
      - name: Enforce CVE drift policy
        run: |
          set -euo pipefail
          baseline_file="security/cve-baseline.json"
          for sev in CRITICAL HIGH MEDIUM; do
            current=$(jq --arg s "$sev" '[.Results[].Vulnerabilities[]? | select(.Severity == $s)] | length' trivy-results.json)
            max_allowed=$(jq -r --arg s "$sev" '.[$s]' "$baseline_file")
            echo "$sev current=$current max_allowed=$max_allowed"
            if [ "$current" -gt "$max_allowed" ]; then
              echo "CVE drift exceeded for $sev: $current > $max_allowed"
              exit 1
            fi
          done
