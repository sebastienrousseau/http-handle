name: 🌍 Portability Matrix

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - ".github/workflows/portability.yml"
      - "docs/PORTABILITY_MATRIX.md"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - ".github/workflows/portability.yml"
      - "docs/PORTABILITY_MATRIX.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-doc-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate portability matrix documentation consistency
        run: |
          chmod +x ./scripts/validate_portability_matrix.sh
          ./scripts/validate_portability_matrix.sh

  host-matrix:
    needs: matrix-doc-consistency
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Host compile + conformance tests
        run: |
          cargo check --all-features
          cargo test --test portability_conformance --all-features

  cross-compile:
    needs: matrix-doc-consistency
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: taiki-e/install-action@84255b8d94c038dee06f4fb8b4f3e8f9ef78c74e # cross
      - name: Cross check
        run: cross check --all-features --target ${{ matrix.target }}
