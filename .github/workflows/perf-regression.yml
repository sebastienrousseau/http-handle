name: ⚡ Performance Regression

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "benches/**"
      - "examples/**"
      - "scripts/perf/**"
      - "Cargo.toml"
      - ".github/workflows/perf-regression.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Install bombardier + wrk
        run: |
          sudo apt-get update
          sudo apt-get install -y wrk golang-go netcat-openbsd
          go install github.com/codesenberg/bombardier@v1.2.6
          echo "${HOME}/go/bin" >> $GITHUB_PATH
      - name: Run benchmark matrix with threshold
        env:
          HTTP_HANDLE_MODE: high-perf
          HTTP_HANDLE_FEATURES: async,high-perf
          MIN_RPS: "1500"
        run: ./scripts/perf/benchmark_matrix.sh
