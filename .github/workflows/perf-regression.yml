name: ⚡ Performance Regression

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "benches/**"
      - "examples/**"
      - "scripts/perf/**"
      - "Cargo.toml"
      - ".github/workflows/perf-regression.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          toolchain: stable
      - name: Install bombardier + wrk
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wrk netcat-openbsd
          curl -L --fail --silent "https://github.com/codesenberg/bombardier/releases/download/v1.2.6/bombardier-linux-amd64" -o /tmp/bombardier
          echo "c29be68fb6711434d50d8c25bc5ce08d33d8265871e6e1a518b3775e530fbb9b  /tmp/bombardier" | sha256sum -c -
          install -m 0755 /tmp/bombardier /usr/local/bin/bombardier
      - name: Prebuild benchmark target
        run: cargo build --example benchmark_target --features async,high-perf
      - name: Run benchmark matrix with threshold
        env:
          HTTP_HANDLE_MODE: high-perf
          HTTP_HANDLE_FEATURES: async,high-perf
          MIN_RPS: "1500"
          PERF_USE_PREBUILT: "1"
        run: ./scripts/perf/benchmark_matrix.sh
