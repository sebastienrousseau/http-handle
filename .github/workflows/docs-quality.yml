name: 📚 Docs Quality

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/**"
      - "scripts/enforce_docs_governance.sh"
      - "docs/DOCS_GOVERNANCE.tsv"
      - "Cargo.toml"
      - "README.md"
      - ".github/workflows/docs-quality.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "docs/**"
      - "scripts/enforce_docs_governance.sh"
      - "docs/DOCS_GOVERNANCE.tsv"
      - "Cargo.toml"
      - "README.md"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Enforce docs governance policy
        run: |
          chmod +x ./scripts/enforce_docs_governance.sh
          ./scripts/enforce_docs_governance.sh
      - name: Validate docs information architecture coverage
        run: |
          chmod +x ./scripts/validate_docs_ia.sh
          ./scripts/validate_docs_ia.sh
      - name: Enforce doc completeness and rustdoc quality
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo check --all-features
          cargo test --doc --all-features
          cargo doc --all-features --no-deps
