name: SLSA Provenance Verification

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release-artifacts.yml"
      - ".github/workflows/slsa-verification.yml"
      - "docs/SLSA_POLICY.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Enforce provenance policy in release workflow
        run: |
          set -euo pipefail
          wf=".github/workflows/release-artifacts.yml"
          grep -q "actions/attest-build-provenance@" "$wf" || { echo "Missing attest-build-provenance step"; exit 1; }
          grep -q "id-token: write" "$wf" || { echo "Missing id-token: write permission"; exit 1; }
          grep -q "attestations: write" "$wf" || { echo "Missing attestations: write permission"; exit 1; }
          echo "SLSA policy checks passed"
