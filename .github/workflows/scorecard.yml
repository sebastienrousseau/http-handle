name: OSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 4 * * 1"
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/scorecard.yml"
      - ".github/scorecard-exceptions.txt"
      - "docs/SCORECARD_POLICY.md"
      - ".github/workflows/*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Enforce Scorecard threshold policy
        run: |
          set -euo pipefail
          exceptions_file=".github/scorecard-exceptions.txt"
          mapfile -t exceptions < <(grep -v '^\s*#' "$exceptions_file" | sed '/^\s*$/d')
          mapfile -t failing < <(jq -r '.runs[].results[] | select(.level=="error") | .ruleId' results.sarif | sort -u)
          violations=()
          for check in "${failing[@]}"; do
            allowed=0
            for ex in "${exceptions[@]}"; do
              if [ "$check" = "$ex" ]; then
                allowed=1
                break
              fi
            done
            if [ "$allowed" -eq 0 ]; then
              violations+=("$check")
            fi
          done
          echo "Detected failing checks: ${#failing[@]}"
          if [ "${#violations[@]}" -gt 0 ]; then
            printf 'Scorecard threshold violations:\n%s\n' "${violations[*]}"
            exit 1
          fi
          echo "Scorecard threshold policy passed."
      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: scorecard-sarif
          path: results.sarif
      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: results.sarif
