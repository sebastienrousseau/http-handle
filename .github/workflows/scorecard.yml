name: OSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 4 * * 1"
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/scorecard.yml"
      - ".github/scorecard-protected-checks.txt"
      - ".github/scorecard-exceptions.txt"
      - "docs/SCORECARD_POLICY.md"
      - ".github/workflows/*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: scorecard-sarif
          path: results.sarif
      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: results.sarif

  enforce-threshold:
    name: Enforce Scorecard threshold policy
    runs-on: ubuntu-latest
    needs: analysis
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run analysis for policy enforcement
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - name: Enforce Scorecard threshold policy
        run: |
          set -euo pipefail
          exceptions_file=".github/scorecard-exceptions.txt"
          protected_file=".github/scorecard-protected-checks.txt"
          mapfile -t exceptions < <(grep -v '^\s*#' "$exceptions_file" | sed '/^\s*$/d')
          mapfile -t protected_checks < <(grep -v '^\s*#' "$protected_file" | sed '/^\s*$/d')
          mapfile -t failing < <(jq -r '.runs[].results[] | select(.level=="error") | .ruleId' results.sarif | sort -u)
          mapfile -t warning_or_error < <(jq -r '.runs[].results[] | select(.level=="warning" or .level=="error") | .ruleId' results.sarif | sort -u)
          violations=()
          for check in "${failing[@]}"; do
            allowed=0
            for ex in "${exceptions[@]}"; do
              if [ "$check" = "$ex" ]; then
                allowed=1
                break
              fi
            done
            if [ "$allowed" -eq 0 ]; then
              violations+=("$check")
            fi
          done
          protected_violations=()
          for check in "${protected_checks[@]}"; do
            present=0
            for finding in "${warning_or_error[@]}"; do
              if [ "$check" = "$finding" ]; then
                present=1
                break
              fi
            done
            if [ "$present" -eq 0 ]; then
              continue
            fi

            allowed=0
            for ex in "${exceptions[@]}"; do
              if [ "$check" = "$ex" ]; then
                allowed=1
                break
              fi
            done
            if [ "$allowed" -eq 0 ]; then
              protected_violations+=("$check")
            fi
          done
          echo "Detected failing checks: ${#failing[@]}"
          if [ "${#violations[@]}" -gt 0 ]; then
            printf 'Scorecard threshold violations:\n%s\n' "${violations[*]}"
            exit 1
          fi
          if [ "${#protected_violations[@]}" -gt 0 ]; then
            printf 'Scorecard protected-check violations (warning/error):\n%s\n' "${protected_violations[*]}"
            exit 1
          fi
          echo "Scorecard threshold policy passed."
