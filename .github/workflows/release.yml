name: 🧪 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: sebastienrousseau/pipelines/.github/workflows/release.yml@v0.0.1
    with:
      language: rust
      dry-run: false
    secrets:
      CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || secrets.CARGO_API_TOKEN }}
