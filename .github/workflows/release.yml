name: 🧪 Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/rust-toolchain-cache
        with:
          toolchain: stable
      - name: Enforce docs governance policy
        run: |
          chmod +x ./scripts/enforce_docs_governance.sh
          ./scripts/enforce_docs_governance.sh
      - name: Validate release readiness (build + tests)
        run: |
          set -euo pipefail
          cargo check --all-features
          cargo test --all-features --lib --tests --bins
